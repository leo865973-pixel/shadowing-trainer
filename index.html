<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shadowing Trainer Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#f5f5f7">
</head>
<body>

  <!-- 頂部導覽列 (Apple Glassmorphism) -->
  <nav class="top-nav glass">
    <div class="nav-brand">ShadowPro</div>
    <div class="nav-tabs">
      <button id="tab-practice" class="nav-btn active">Practice</button>
      <button id="tab-library" class="nav-btn">Library</button>
    </div>
  </nav>

  <!-- 畫面 1：SETUP SCREEN (練習設定) -->
  <div id="setup-screen" class="screen active">
    <div class="kpi-dashboard">
      <div class="kpi-card glass">
        <div class="kpi-value" id="kpi-streak">0</div>
        <div class="kpi-label">Day Streak</div>
      </div>
      <div class="kpi-card glass">
        <div class="kpi-value" id="kpi-sentences">0</div>
        <div class="kpi-label">Sentences</div>
      </div>
      <div class="kpi-card glass">
        <div class="kpi-value" id="kpi-attempts">0</div>
        <div class="kpi-label">Attempts</div>
      </div>
    </div>

    <div class="setup-container glass">
      <textarea id="text-input" placeholder="Paste your English text here to start training..."></textarea>
      
      <div class="voice-settings">
        <label for="voice-select">Voice Engine</label>
        <select id="voice-select"><option>Loading voices...</option></select>
      </div>

      <div class="level-selector">
        <label class="radio-card"><input type="radio" name="level" value="beginner" checked> <span>Beginner</span></label>
        <label class="radio-card"><input type="radio" name="level" value="normal"> <span>Normal</span></label>
        <label class="radio-card"><input type="radio" name="level" value="fluency"> <span>Fluency</span></label>
      </div>

      <button id="btn-start" class="btn primary-btn">Start Training</button>
    </div>
  </div>

  <!-- 畫面 2：LIBRARY SCREEN (文本資料庫) -->
  <div id="library-screen" class="screen">
    <div class="library-header glass">
      <input type="text" id="search-input" placeholder="Search texts...">
      <div class="filter-group">
        <select id="sort-select">
          <option value="edit-desc">Sort: Newest Edited</option>
          <option value="edit-asc">Sort: Oldest Edited</option>
          <option value="create-desc">Sort: Newest Created</option>
          <option value="length-desc">Sort: Longest</option>
          <option value="length-asc">Sort: Shortest</option>
        </select>
        <select id="filter-select">
          <option value="all">All Status</option>
          <option value="learning">Learning</option>
          <option value="familiar">Familiar</option>
          <option value="mastered">Mastered</option>
        </select>
      </div>
    </div>
    <div id="library-list" class="library-list">
      <!-- Cards will be injected here -->
    </div>
  </div>

  <!-- 畫面 3：TRAINING SCREEN (訓練畫面) -->
  <div id="training-screen" class="screen">
    <header class="training-header glass">
      <button id="btn-exit" class="btn icon-text-btn">✕ Exit</button>
      <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
      <button id="btn-toggle-markup" class="btn icon-text-btn">👁️ Parse</button>
    </header>

    <div class="training-container">
      <div id="pulse-indicator" class="pulse"></div>
      <div id="status-text" class="status-label">GET READY</div>
      <h2 id="current-sentence" class="sentence-display"></h2>
      <div class="transcript-box glass"><span id="user-transcript">Waiting for you to speak...</span></div>
    </div>

    <div class="shortcut-hints">
      <span><b>A</b> 上一句</span>
      <span><b>Space</b> 暫停/繼續</span>
      <span><b>S</b> 重播</span>
      <span><b>D</b> 下一句</span>
    </div>

    <div class="controls glass">
      <button id="btn-back" class="btn icon-btn">⏮</button>
      <button id="btn-pause" class="btn icon-btn">⏸</button>
      <button id="btn-replay" class="btn icon-btn">🔁</button>
      <button id="btn-next" class="btn icon-btn">⏭</button>
      <button id="btn-speak" class="btn icon-btn primary-icon-btn">🎤</button>
    </div>
  </div>

  <!-- 編輯 Modal -->
  <div id="edit-modal" class="modal-overlay">
    <div class="modal-content glass">
      <h3>Edit Text</h3>
      <textarea id="edit-textarea"></textarea>
      <div class="modal-actions">
        <select id="edit-status">
          <option value="learning">🟠 Learning</option>
          <option value="familiar">🔵 Familiar</option>
          <option value="mastered">🟢 Mastered</option>
        </select>
        <div class="btn-group">
          <button id="btn-cancel-edit" class="btn secondary-btn">Cancel</button>
          <button id="btn-save-edit" class="btn primary-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
